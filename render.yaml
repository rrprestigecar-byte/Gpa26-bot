services:
  - type: worker
    name: gpa26-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -u bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CHECK_INTERVAL
        value: "60"
      - key: PRIX_MAX
        value: "0"
      - key: KM_MAX
        value: "0"
      - key: CARBURANT
        value: ""
      - key: PROCEDURE
        value: ""
      - key: MARQUES
        value: ""
